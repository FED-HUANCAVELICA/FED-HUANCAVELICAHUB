<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FED 2.0 STRATEGIC HUB — WANKA WILLKA | HUANCAVELICA 2025-2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
/* ============================================================
   FED STRATEGIC HUB — WANKA WILLKA
   Modo Claro / Diseño de Alta Gerencia Corporativa
   DGIPAT-MIDIS · Huancavelica · 2025-2026
   ============================================================ */

:root {
  --bg-primary:    #f8fafc; /* Gris claro premium de fondo */
  --bg-card:       #ffffff; /* Tarjetas blancas impolutas */
  --bg-card-hover: #f1f5f9;
  --bg-panel:      #ffffff;
  --border:        #e2e8f0; /* Bordes suaves */
  --border-hi:     #cbd5e1;
  --text-primary:  #0f172a; /* Texto principal Slate 900 */
  --text-sec:      #475569; /* Slate 600 */
  --text-muted:    #64748b; /* Slate 500 */
  --blue:          #2563eb; /* Azul corporativo fuerza */
  --blue-lt:       #3b82f6;
  --green:         #10b981; /* Verde esmeralda de cumplimiento */
  --green-bg:      rgba(16,185,129,0.12);
  --yellow:        #d97706; /* Amarillo/Ámbar de proceso con buen contraste */
  --yellow-bg:     rgba(245,158,11,0.12);
  --red:           #ef4444; /* Rojo de alerta crítica */
  --red-bg:        rgba(239,68,68,0.12);
  --purple:        #7c3aed;
  --radius:        16px;
  --radius-sm:     8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* ─── HEADER UNIFICADO FED 2.0 ────────────────── */
.header {
  background: #0f172a; /* Deep Navy unificado */
  border-bottom: 1px solid #1e293b;
  padding: 16px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
  gap: 12px;
  flex-wrap: wrap;
  color: #ffffff;
}

.header-left { display: flex; align-items: center; gap: 14px; }

.logo-box {
  width: 56px; height: 56px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
  overflow: hidden;
  box-shadow: 0 0 15px rgba(255,255,255,0.1);
  background: #1e293b;
}
.logo-box img {
  width: 100%; height: 100%;
  object-fit: cover; border-radius: 50%;
}
.logo-box .logo-fallback { font-size: 26px; display: none; }
.logo-box img[src=""] ~ .logo-fallback,
.logo-box img:not([src]) ~ .logo-fallback { display: block; }

.header-title {
  font-size: 18px; font-weight: 800; letter-spacing: -.4px;
  color: #ffffff;
}
.header-sub {
  font-size: 10px; color: #94a3b8; margin-top: 2px;
  letter-spacing: .6px; text-transform: uppercase;
}

.logos-banner { display: flex; gap: 15px; align-items: center; }
.logos-banner img {
  max-height: 38px;
  object-fit: contain;
  filter: brightness(1.2);
}

.selector-group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

select {
  background: #ffffff;
  color: #1e293b;
  border: 1px solid var(--border-hi);
  border-radius: var(--radius-sm);
  padding: 7px 12px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  outline: none;
  transition: all .2s;
}
select:hover { border-color: var(--blue); background: #f8fafc; }

.live-badge {
  background: rgba(37, 99, 235, 0.1);
  color: #3b82f6;
  border: 1px solid rgba(37, 99, 235, 0.25);
  border-radius: 8px;
  padding: 6px 13px;
  font-size: 9px; font-weight: 700;
  display: flex; align-items: center; gap: 7px;
  letter-spacing: .35px;
}

/* ─── TABS MODO CLARO ────────────────────────────── */
.tabs-nav {
  background: #ffffff;
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  display: flex; gap: 4px;
  overflow-x: auto;
  position: sticky;
  top: 89px;
  z-index: 150;
  box-shadow: 0 4px 10px rgba(0,0,0,.02);
}

.tab-btn {
  padding: 16px 26px;
  background: none; border: none;
  color: var(--text-muted);
  font-size: 12.5px; font-weight: 700;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all .2s;
  letter-spacing: .5px;
  white-space: nowrap;
  display: flex; align-items: center; gap: 8px;
}
.tab-btn:hover { color: var(--text-primary); background: #f8fafc; }
.tab-btn.active {
  color: var(--blue);
  border-bottom-color: var(--blue);
  background: #eff6ff;
}
.tab-count {
  font-size: 10px; font-weight: 700;
  background: #f1f5f9; color: var(--text-sec);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 1px 7px;
}
.tab-btn.active .tab-count { background: var(--blue); color: #fff; border-color: var(--blue); }

/* ─── MAIN ────────────────────────────────────────── */
.main { padding: 24px 28px; max-width: 1440px; margin: 0 auto; }

/* ─── BANNER GLOBAL NORTH STAR CLARO ──────────────── */
.north-star {
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 24px 28px;
  margin-bottom: 26px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 4px 15px rgba(0,0,0,.01);
  flex-wrap: wrap; gap: 20px;
}

.period-selector {
  display: flex; flex-direction: column; gap: 6px; flex-shrink: 0;
  border-right: 1px solid var(--border); padding-right: 24px;
}
.period-tag { font-size: 9px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; font-weight: 700; }
.period-controls { display: flex; gap: 8px; align-items: center; }
.period-controls select { border: 1px solid var(--border-hi); background: #f8fafc; padding: 8px 12px; font-size: 12px; }
.period-current { font-size: 11px; color: var(--blue); margin-top: 2px; font-weight: 700; }

.ns-stats-center { flex: 1; display: flex; align-items: stretch; justify-content: center; }
.stat-card { flex: 1; text-align: center; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.stat-big { font-size: 44px; font-weight: 900; line-height: 1; }
.stat-lbl2 { font-size: 10px; color: var(--text-muted); margin-top: 6px; font-weight: 700; text-transform: uppercase; }
.stat-card-green  .stat-big { color: var(--green); }
.stat-card-yellow .stat-big { color: var(--yellow); }
.stat-card-red    .stat-big { color: var(--red); }
.stat-card-total  .stat-big { color: var(--text-primary); }
.stat-divider { width: 1px; align-self: stretch; background: var(--border); margin: 8px 0; }

.sem-legend { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; border-left: 1px solid var(--border); padding-left: 24px; }
.sem-legend-title { font-size: 9px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; font-weight: 700; margin-bottom: 2px; }
.leg-item  { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-sec); font-weight: 500; }
.leg-dot   { width: 10px; height: 10px; border-radius: 50%; }

/* ─── SECTOR SECTIONS EN MODO CLARO ──────────────── */
.sector-group { margin-bottom: 28px; }
.sector-hdr {
  display: flex; align-items: center; gap: 12px; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 2px solid var(--border);
}
.sector-badge { padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
.sec-agua  { background: #eff6ff;  color: #2563eb; border: 1px solid #bfdbfe; }
.sec-salud { background: #ecfdf5;  color: #059669; border: 1px solid #a7f3d0; }
.sec-edu   { background: #fffbeb;  color: #d97706; border: 1px solid #fde68a; }
.sec-ei    { background: #fff7ed;  color: #ea580c; border: 1px solid #ffedd5; }
.sec-art   { background: #faf5ff;  color: #7c3aed; border: 1px solid #f3e8ff; }
.sec-vif   { background: #fff5f5;  color: #e53e3e; border: 1px solid #fed7d7; }

.cp-badge { font-size: 9px; font-weight: 700; background: #f1f5f9; color: var(--blue); border: 1px solid var(--border-hi); border-radius: 4px; padding: 1px 5px; }
.nd-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); }
.nd-row b { color: var(--text-primary); font-weight: 700; }
.nd-sep   { color: var(--border-hi); }
.sector-title { font-size: 13.5px; font-weight: 700; color: var(--text-primary); }
.sector-count { font-size: 11px; color: var(--text-muted); margin-left: auto; font-weight: 600; }

/* ─── CARDS PREMIUM CLARAS ────────────────────────── */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; min-height: 50px; }
.card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; cursor: pointer;
  transition: all .2s ease; position: relative; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
}
.card:hover  { border-color: var(--border-hi); background: #f8fafc; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,.03); }
.card.active { border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue), 0 4px 15px rgba(37,99,235,.1); }

.card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
.card-code { font-size: 10px; font-weight: 700; color: var(--text-sec); background: #f1f5f9; padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); }

.semaforo { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; }
.sem-g { background: var(--green-bg);  color: var(--green);  border: 2px solid rgba(16,185,129,.4); }
.sem-y { background: var(--yellow-bg); color: var(--yellow); border: 2px solid rgba(245,158,11,.4); }
.sem-r { background: var(--red-bg);    color: var(--red);    border: 2px solid rgba(239,68,68,.4); }
.sem-n { background: #f1f5f9; color: var(--text-muted); border: 2px solid var(--border-hi); font-size: 11px; }

.card-name { font-size: 12px; font-weight: 600; color: var(--text-primary); margin-bottom: 12px; line-height: 1.45; min-height: 34px; }
.card-val-row { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 10px; }
.card-num { font-size: 32px; font-weight: 800; line-height: 1; }
.card-unit { font-size: 13px; color: var(--text-sec); font-weight: 600; margin-bottom: 2px; }

.lbmeta { display: flex; gap: 4px; flex-direction: column; align-items: flex-end; }
.lb-pill { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600; background: #f1f5f9; color: var(--text-sec); border: 1px solid var(--border); }
.meta-pill { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600; background: #eff6ff; color: var(--blue); border: 1px solid #bfdbfe; }

.prog-track { width: 100%; height: 6px; background: #e2e8f0; border-radius: 4px; overflow: hidden; margin-top: 10px; }
.prog-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }

.estado-row { margin-top: 10px; display: flex; justify-content: flex-start; }
.estado-badge { font-size: 9.5px; font-weight: 700; padding: 3px 9px; border-radius: 12px; text-transform: uppercase; }
.estado-cumplida { background: #ecfdf5;  color: var(--green); border: 1px solid #a7f3d0; }
.estado-superada { background: #d1fae5;  color: #047857;     border: 1px solid #6ee7b7; font-weight: 800; }
.estado-proceso  { background: #fffbeb;  color: var(--yellow); border: 1px solid #fde68a; }
.estado-critico  { background: #fff5f5;  color: var(--red);    border: 1px solid #fed7d7; }

.dir-badge { font-size: 9px; font-weight: 700; background: #f5f3ff; color: #6d28d9; border: 1px solid #e9d5ff; border-radius: 4px; padding: 1px 5px; }

/* ─── CAJAS DE RECOMENDACIÓN CON COLORES CLAROS ───── */
.recom-box {
  margin-top: 10px; padding: 8px 10px; border-radius: 8px; font-size: 11px; line-height: 1.45;
  display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 4; overflow: hidden;
}
.recom-box::before { content: 'Acción Inmediata:'; display: block; font-size: 9px; font-weight: 800; text-transform: uppercase; margin-bottom: 3px; }
.recom-critico { background: #fff5f5; border-left: 3px solid var(--red); color: #991b1b; }
.recom-proceso { background: #fffbeb; border-left: 3px solid #f59e0b; color: #92400e; }
.recom-fallback { font-style: italic; opacity: 0.7; text-transform: uppercase; font-size: 10px; }

.card-trend-hint { margin-top: 10px; font-size: 10px; color: var(--text-muted); text-align: right; font-weight: 500; }
.card:hover .card-trend-hint { color: var(--blue); }

.tab-pane { display: none; }
.tab-pane.active { display: block; }

.footer { text-align: center; padding: 24px; color: var(--text-muted); font-size: 11px; border-top: 1px solid var(--border); margin-top: 40px; background: #ffffff; }

/* ─── MODAL DE AVANCE MENSUAL CLARO ───────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); z-index: 600;
  display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px);
  opacity: 0; visibility: hidden; transition: all .2s;
}
.modal-overlay.open { opacity: 1; visibility: visible; }
.modal-box {
  background: #ffffff; border: 1px solid var(--border-hi); border-radius: 20px; width: 100%; max-width: 850px;
  max-height: 90vh; overflow-y: auto; padding: 28px 30px; position: relative; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05);
  transform: translateY(10px); transition: all .2s;
}
.modal-overlay.open .modal-box { transform: translateY(0); }
.modal-close {
  position: absolute; top: 16px; right: 16px; background: #f1f5f9; border: 1px solid var(--border);
  color: var(--text-sec); border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 12px; font-weight: 700;
}
.modal-close:hover { background: #e2e8f0; color: var(--text-primary); }
.modal-hdr { margin-bottom: 16px; }
.modal-code-tag { font-size: 10px; font-weight: 700; color: var(--text-sec); background: #f1f5f9; padding: 3px 9px; border-radius: 4px; border: 1px solid var(--border); display: inline-block; margin-bottom: 8px; }
.modal-title { font-size: 15px; font-weight: 800; color: var(--text-primary); margin-bottom: 4px; }
.modal-sub   { font-size: 11.5px; color: var(--text-sec); line-height: 1.5; }
.modal-pills { display: flex; gap: 7px; flex-wrap: wrap; margin: 12px 0; }
.modal-pill-item { font-size: 11px; padding: 4px 12px; border-radius: 6px; font-weight: 600; }
.modal-pill-meta { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
.modal-pill-lb   { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
.modal-pill-tipo { background: #f5f3ff; color: #6d28d9; border: 1px solid #e9d5ff; }

.modal-recom-box { margin: 14px 0 4px; padding: 10px 14px; border-radius: 8px; font-size: 12px; line-height: 1.5; }
.modal-recom-box::before { content: '⚡ Acción Inmediata:'; display: block; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
.modal-recom-box.recom-critico { background: #fff5f5; border-left: 4px solid var(--red); color: #991b1b; }
.modal-recom-box.recom-proceso  { background: #fffbeb; border-left: 4px solid #f59e0b; color: #92400e; }

.modal-chart-wrap { position: relative; height: 320px; }
.modal-legend-row { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 16px; font-size: 11px; color: var(--text-sec); align-items: center; padding-top: 14px; border-top: 1px solid var(--border); }
.modal-leg-item  { display: flex; align-items: center; gap: 6px; }
.modal-leg-line  { width: 24px; height: 0; border-top: 2.5px dashed; }
.modal-leg-swatch{ width: 12px; height: 12px; border-radius: 3px; }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo-box">
      <img src="logo_wanka_willka.png.png" alt="FED Wanka Willka" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
      <span class="logo-fallback">🏔</span>
    </div>
    <div>
      <div class="header-title">🚀 FED 2.0 STRATEGIC HUB — WANKA WILLKA</div>
      <div class="header-sub">Fondo de Estímulo al Desempeño · DGIPAT-MIDIS · Región Huancavelica · 2025-2026</div>
    </div>
  </div>
  
  <div class="logos-banner">
      <img src="logo-midis.png.jpg" alt="MIDIS">
      <img src="logo-fed.png.png" alt="FED">
  </div>
  <div class="selector-group">
      <div class="live-badge">MONITOREO FED 2.0: TRAMO 1 (DIC 2025 - MAY 2026)</div>
  </div>
</header>

<nav class="tabs-nav" id="tabsNav">
  <button class="tab-btn active" onclick="switchTab(1, this)">
    ⚙️ COMPROMISOS DE GESTIÓN
    <span class="tab-count" id="tabCount1">—</span>
  </button>
  <button class="tab-btn" onclick="switchTab(2, this)">
    🎯 METAS DE COBERTURA
    <span class="tab-count" id="tabCount2">—</span>
  </button>
</nav>

<main class="main">

  <div class="north-star">
    <div class="period-selector">
      <div class="period-tag">📅 Período de Reporte</div>
      <div class="period-controls">
        <select id="selYear" onchange="updateDashboard()" title="Año de evaluación">
          <option value="2025">Año 2025</option>
          <option value="2026" selected>Año 2026</option>
        </select>
        <select id="selMonth" onchange="updateDashboard()" title
